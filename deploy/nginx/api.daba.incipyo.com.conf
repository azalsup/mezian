# Redirect HTTP requests to HTTPS
# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.daba.incipyo.com;
    return 301 https://$host$request_uri;
}

# Reverse Proxy to PocketBase for Site2
server {
    listen 443 ssl;
    server_name api.daba.incipyo.com;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/api.daba.incipyo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.daba.incipyo.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;  # golang backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

