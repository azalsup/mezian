<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <!-- Carré arabesque stylisé -->
  <rect x="4" y="4" width="48" height="48" rx="10" fill="#C0392B"/>
  <!-- Losange central -->
  <polygon points="28,12 44,28 28,44 12,28" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Point central -->
  <circle cx="28" cy="28" r="4" fill="white"/>
  <!-- Quatre points cardinaux -->
  <circle cx="28" cy="16" r="2.5" fill="white" opacity=".7"/>
  <circle cx="28" cy="40" r="2.5" fill="white" opacity=".7"/>
  <circle cx="16" cy="28" r="2.5" fill="white" opacity=".7"/>
  <circle cx="40" cy="28" r="2.5" fill="white" opacity=".7"/>

  <!-- Wordmark "mezian" -->
  <text x="66" y="35"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="26"
        font-weight="700"
        letter-spacing="-0.5"
        fill="#1a1a2e">mezian</text>

  <!-- Tagline -->
  <text x="67" y="48"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="10"
        letter-spacing="2"
        fill="#C0392B"
        text-anchor="start">PETITES ANNONCES</text>
</svg>
