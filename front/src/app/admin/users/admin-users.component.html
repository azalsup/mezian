<div class="max-w-6xl mx-auto">

  <!-- Header -->
  <div class="mb-6">
    <h2 class="text-xl font-bold text-gray-900">Gestion des utilisateurs</h2>
    <p class="text-sm text-gray-500 mt-0.5">
      Clients externes et personnel interne. Les utilisateurs externes n'ont jamais accès au panneau d'administration.
    </p>
  </div>

  <!-- Tabs -->
  <div class="flex gap-1 mb-6 bg-gray-100 rounded-xl p-1 w-fit">
    <button
      (click)="setTab('external')"
      class="px-5 py-2 rounded-lg text-sm font-medium transition-colors"
      [class]="activeTab() === 'external'
        ? 'bg-white text-gray-900 shadow-sm'
        : 'text-gray-500 hover:text-gray-700'"
    >
      <i class="fa-solid fa-users mr-2"></i>Clients
    </button>
    <button
      (click)="setTab('internal')"
      class="px-5 py-2 rounded-lg text-sm font-medium transition-colors"
      [class]="activeTab() === 'internal'
        ? 'bg-white text-gray-900 shadow-sm'
        : 'text-gray-500 hover:text-gray-700'"
    >
      <i class="fa-solid fa-user-shield mr-2"></i>Personnel
    </button>
  </div>

  <!-- Tab content -->
  @if (activeTab() === 'external') {
    <app-external-users-tab [callerRole]="callerRole" />
  }
  @if (activeTab() === 'internal') {
    <app-internal-users-tab [callerRole]="callerRole" />
  }

</div>
