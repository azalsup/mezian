<a [routerLink]="['/ad']" [queryParams]="{id: ad.slug}"
  class="group flex flex-col bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-200 hover:-translate-y-0.5 cursor-pointer">

  <!-- Image -->
  <div class="relative aspect-[4/3] bg-gray-100 overflow-hidden shrink-0">
    @if (coverUrl()) {
      <img [src]="coverUrl()" [alt]="ad.title"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
    } @else {
      <div class="flex items-center justify-center h-full text-gray-200">
        <span class="material-icons-round text-[56px]">image</span>
      </div>
    }
    @if (ad.badge) {
      <span class="absolute top-2 start-2 px-2 py-[3px] text-[.7rem] font-bold tracking-wide rounded-md"
        [ngClass]="badgeCls(ad.badge)">
        {{ badgeLabel(ad.badge) }}
      </span>
    }
  </div>

  <!-- Info -->
  <div class="p-3 flex flex-col gap-1 flex-1">
    <p class="text-[.88rem] font-semibold text-[#1a1a2e] leading-snug line-clamp-2">{{ ad.title }}</p>

    @if (ad.price !== null) {
      <p class="text-[#006233] font-extrabold text-[1rem]">
        {{ ad.price | number:'1.0-0' }}&nbsp;{{ lang.t('currency') }}
      </p>
    } @else {
      <p class="text-gray-400 text-[.83rem]">{{ lang.t('priceNegotiable') }}</p>
    }

    <div class="flex items-center gap-1 text-gray-400 text-[.75rem] mt-auto pt-1">
      <span class="material-icons-round text-[13px]">location_on</span>
      <span class="flex-1 truncate">{{ ad.city }}</span>
      <span>{{ formatDate(ad.created_at) }}</span>
    </div>
  </div>
</a>
