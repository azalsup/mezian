@if (auth.modalOpen()) {
  <div class="modal-backdrop" (click)="close()"></div>

  <div class="modal-card" role="dialog">
    <div class="modal-header">
      <div class="flex items-center gap-x-2">
        <div class="modal-logo-icon"><span class="material-icons-round" style="font-size:18px">flag</span></div>
        <span class="logo-font text-2xl text-[#006233]">daba</span>
      </div>
      <button class="modal-close" (click)="close()">
        <span class="material-icons-round" style="font-size:20px">close</span>
      </button>
    </div>

    <app-auth-form
      [initialScreen]="auth.modalMode() === 'login' ? 'login' : 'reg-credentials'"
      [asPage]="false"
      (done)="close()" />
  </div>
}
