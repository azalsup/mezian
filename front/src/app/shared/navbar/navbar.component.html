<nav class="bg-white border-b sticky top-0 z-[200] shadow-sm">
  <div class="px-6">
    <div class="h-16 flex items-center justify-between">

      <!-- Left side: hamburger and logo -->
      <div class="flex items-center gap-3">
        <!-- Mobile hamburger -->
        <button
          (click)="toggleMobileMenu($event)"
          class="md:hidden flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-100 transition-colors">
          <span class="material-icons-round text-[#006233] text-[24px]">menu</span>
        </button>

        <!-- Logo -->
        <div (click)="goHome()" class="flex items-center gap-3 cursor-pointer">
          <div class="w-9 h-9 bg-[#006233] text-white rounded-2xl flex items-center justify-center">
            <span class="material-icons-round text-[20px]">flag</span>
          </div>
          <h1 class="font-pacifico text-3xl tracking-tight text-[#006233]">daba</h1>
        </div>
      </div>

      <!-- Desktop right actions -->
      <div class="hidden md:flex items-center gap-4">
        <!-- Sell button -->
        <button
          (click)="onSellClick()"
          class="bg-[#006233] hover:bg-[#005229] text-white text-base font-semibold px-8 h-11 rounded-3xl flex items-center gap-2 transition-colors">
          <span class="material-icons-round text-[20px]">add</span>
          <span>{{ lang.t('sell') }}</span>
        </button>

        <!-- Profile / Register -->
        <app-profile-dropdown></app-profile-dropdown>

        <!-- Language switcher -->
        <div class="relative">
          <button
            (click)="toggleLangMenu($event)"
            class="flex items-center gap-1.5 px-3 h-11 border border-gray-300 hover:border-[#006233] rounded-3xl transition-colors text-sm font-medium">
            <span>{{ lang.currentLang().flag }}</span>
            <span>{{ lang.currentLang().code.toUpperCase() }}</span>
            <span class="material-icons-round text-gray-400 text-[16px]">expand_more</span>
          </button>

          @if (showLangMenu) {
            <div class="absolute end-0 mt-3 w-44 bg-white rounded-2xl shadow-2xl border py-2 z-50" (click)="$event.stopPropagation()">
              @for (l of lang.languages; track l.code) {
                <button
                  (click)="selectLang(l.code, $event)"
                  class="w-full flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-gray-50 transition-colors"
                  [class.text-\[#006233\]]="lang.current() === l.code"
                  [class.font-semibold]="lang.current() === l.code">
                  <span>{{ l.flag }}</span>
                  <span>{{ l.label }}</span>
                  @if (lang.current() === l.code) {
                    <span class="material-icons-round ms-auto text-[#006233] text-[16px]">check</span>
                  }
                </button>
              }
            </div>
          }
        </div>

      </div>

    </div>

    <!-- Mobile menu -->
    @if (showMobileMenu) {
      <div class="md:hidden bg-white border-t px-6 py-4 space-y-4" (click)="$event.stopPropagation()">
        <!-- Sell button -->
        <button
          (click)="onSellClick()"
          class="w-full bg-[#006233] hover:bg-[#005229] text-white text-base font-semibold px-8 h-11 rounded-3xl flex items-center justify-center gap-2 transition-colors">
          <span class="material-icons-round text-[20px]">add</span>
          <span>{{ lang.t('sell') }}</span>
        </button>

        <!-- Profile / Register -->
        <app-profile-dropdown [isMobile]="true"></app-profile-dropdown>

        <!-- Language switcher -->
        <div class="relative">
          <button
            (click)="toggleLangMenu($event)"
            class="w-full flex items-center justify-center gap-1.5 px-3 h-11 border border-gray-300 hover:border-[#006233] rounded-3xl transition-colors text-sm font-medium">
            <span>{{ lang.currentLang().flag }}</span>
            <span>{{ lang.currentLang().code.toUpperCase() }}</span>
            <span class="material-icons-round text-gray-400 text-[16px]">expand_more</span>
          </button>

          @if (showLangMenu) {
            <div class="absolute left-0 mt-3 w-full bg-white rounded-2xl shadow-2xl border py-2 z-50" (click)="$event.stopPropagation()">
              @for (l of lang.languages; track l.code) {
                <button
                  (click)="selectLang(l.code, $event)"
                  class="w-full flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-gray-50 transition-colors"
                  [class.text-\[#006233\]]="lang.current() === l.code"
                  [class.font-semibold]="lang.current() === l.code">
                  <span>{{ l.flag }}</span>
                  <span>{{ l.label }}</span>
                  @if (lang.current() === l.code) {
                    <span class="material-icons-round ms-auto text-[#006233] text-[16px]">check</span>
                  }
                </button>
              }
            </div>
          }
        </div>
      </div>
    }

  </div>
</nav>
