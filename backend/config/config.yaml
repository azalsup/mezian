server:
  port: 3000
  mode: debug
  base_url: "http://localhost:3000"
  frontend_url: "http://localhost:8000"
  cors_origins:
    - "http://localhost:8000"
    - "http://localhost:3000"

database:
  path: "./classifieds.db"

jwt:
  secret: "CHANGE_ME_IN_PRODUCTION_min32chars!!"
  access_ttl_minutes: 15
  refresh_ttl_days: 30

otp:
  length: 6
  ttl_minutes: 10
  max_attempts: 5
  rate_limit_per_hour: 3

admin:
  email: "admin@mezian.ma"
  phone: "+212600000001"
  password: "Admin@Mezian2024!"
  display_name: "Administrateur"

seed:
  force: false   # set to true once to wipe and recreate all categories

auth:
  otp_enabled: true              # false → disable OTP flows, password-only
  primary_identifier: phone      # phone | email — which field is shown first
  phone_required: true           # phone mandatory on registration
  email_required: false          # email mandatory on registration
  default_country: MA            # ISO 3166-1 alpha-2 pre-filled in address form

notification:
  provider: "mock"   # mock | twilio | infobip | orange_ma
  twilio:
    account_sid: ""
    auth_token: ""
    from_number: "+212XXXXXXXXX"
  whatsapp:
    api_url: ""
    api_token: ""
    phone_number_id: ""

media:
  upload_dir: "./uploads"
  max_size_mb: 5
  max_per_ad: 10
  thumbnail_width: 400
  thumbnail_height: 300
  allowed_types:
    - "image/jpeg"
    - "image/png"
    - "image/webp"

plans:
  starter:
    price_mad: 199
    max_ads: 50
    duration_days: 30
  pro:
    price_mad: 399
    max_ads: 200
    duration_days: 30
  premium:
    price_mad: 799
    max_ads: -1
    duration_days: 30
